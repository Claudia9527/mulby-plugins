<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="drive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Hard drive body -->
  <rect x="96" y="128" width="320" height="256" rx="32" fill="url(#drive)" opacity="0.9"/>
  <!-- Drive platter circle -->
  <circle cx="256" cy="240" r="72" fill="none" stroke="#c7d2fe" stroke-width="6" opacity="0.6"/>
  <circle cx="256" cy="240" r="32" fill="#c7d2fe" opacity="0.4"/>
  <circle cx="256" cy="240" r="8" fill="#e0e7ff"/>
  <!-- Drive arm -->
  <line x1="320" y1="340" x2="270" y2="260" stroke="#e0e7ff" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="320" cy="340" r="12" fill="#e0e7ff" opacity="0.6"/>
  <!-- Status bar segments (space usage visualization) -->
  <rect x="120" y="348" width="100" height="16" rx="4" fill="#4ade80" opacity="0.8"/>
  <rect x="224" y="348" width="60" height="16" rx="4" fill="#facc15" opacity="0.8"/>
  <rect x="288" y="348" width="40" height="16" rx="4" fill="#f97316" opacity="0.8"/>
  <rect x="332" y="348" width="60" height="16" rx="4" fill="#ef4444" opacity="0.8"/>
  <!-- Magnifier icon -->
  <circle cx="380" cy="160" r="36" fill="none" stroke="#e0e7ff" stroke-width="7"/>
  <line x1="406" y1="186" x2="430" y2="210" stroke="#e0e7ff" stroke-width="8" stroke-linecap="round"/>
</svg>
